<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">

  <title>InsightTube AI</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="chat-container">

    <!-- Header -->

    <div class="top-bar">

      <div class="logo">

        🕵️ InsightTube AI

      </div>

    </div>

    <p class="subtitle">
      Ask anything about this video
    </p>

    <!-- Chat -->

    <div id="chat-box"></div>

   

    <!-- Question -->

    <div class="question-wrapper">

      <textarea
        id="question"
        placeholder="Ask anything about this video..."
      ></textarea>

      <button id="askBtn">

        ➤

      </button>

    </div>

    <!-- Footer Buttons -->

    <div class="footer-buttons">

      <button id="clearBtn">

        🗑 Clear Chat

      </button>

    </div>

    <!-- Footer -->

    <div class="footer">

      Made with ❤️ by Vaibhavi

    </div>

  </div>

  <script src="popup.js"></script>

</body>

</html>
